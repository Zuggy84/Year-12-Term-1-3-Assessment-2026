<!DOCTYPE>
<html>
    <head>
        <title>Log In Page</title>
        <link rel = "stylesheet" type = "text/css" href = "/static/css/Assessment_Tracker.css">
    </head>
    <body>
        <h1>Familiar? Log In Here!</h1>
        <form method = "POST" action = "/log_in">
            <label for = "user_name">User Name</label>
            <input type = "text" name = "user_name" required>
            <label for = "user_password">Password</label>
            <input type = "password" name = "user_password" required>
            <input type = "submit" value = "Log In">
        </form>
        {% if user_log_in_unsuccessful == True %}
            <p>Invalid Credential/Credentials, Try Again!</p>
        {% endif %}
        <h2>Navigation Menu:</h2>
        <a href = "/register">Register Page</a>
        <a href = "/">Home Page</a>
    </body>
</html>
